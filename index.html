<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3D Tic Tac Toe</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@400;700&display=swap');
  :root{--bg:#060810;--x:#ff3d6e;--o:#00e5ff;--border:#1e2540;--text:#b0b8d8;--accent:#6e78ff;}
  *{box-sizing:border-box;margin:0;padding:0;}

  html{height:100%;}
  body{
    height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:'Exo 2',sans-serif;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    user-select:none;
    -webkit-user-select:none;
  }

  /* ── TOP BAR ── */
  #topbar{
    flex-shrink:0;
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 12px 6px;
  }
  #topbar h1{
    font-family:'Share Tech Mono',monospace;
    font-size:0.9rem;
    letter-spacing:0.18em;
    background:linear-gradient(90deg,var(--x),var(--accent),var(--o));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    white-space:nowrap;flex-shrink:0;
  }
  #msg{
    flex:1;
    font-family:'Share Tech Mono',monospace;
    font-size:0.72rem;
    text-align:center;
    padding:5px 8px;
    background:#0e1120;
    border:1px solid var(--border);
    border-radius:7px;
    color:var(--text);
    overflow:hidden;
    white-space:nowrap;
    text-overflow:ellipsis;
  }
  .dots{display:flex;gap:5px;flex-shrink:0;}
  .dot{
    width:26px;height:26px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Share Tech Mono',monospace;font-size:0.72rem;font-weight:700;
    transition:all 0.25s;flex-shrink:0;
  }
  .dot-x{background:#ff3d6e18;border:2px solid var(--x);color:var(--x);}
  .dot-o{background:#00e5ff18;border:2px solid var(--o);color:var(--o);}
  .dot-active{box-shadow:0 0 9px currentColor;transform:scale(1.18);}

  /* ── CANVAS ── */
  #canvas-wrap{
    flex:1;
    min-height:0;
    position:relative;
  }
  canvas{
    display:block;
    width:100%!important;
    height:100%!important;
    cursor:grab;
  }
  #tip{
    position:absolute;
    background:#0c0f1eee;
    border:1px solid var(--border);
    border-radius:5px;
    padding:3px 8px;
    font-family:'Share Tech Mono',monospace;
    font-size:0.62rem;
    color:var(--text);
    pointer-events:none;
    display:none;
    z-index:5;
  }

  /* ── BOTTOM ── */
  #bottom{
    flex-shrink:0;
    padding:6px 10px 12px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .score-row{display:flex;gap:6px;}
  .sc{
    flex:1;background:#0e1120;border:1px solid var(--border);
    border-radius:7px;padding:4px 6px;text-align:center;
    font-family:'Share Tech Mono',monospace;
  }
  .sc-lbl{display:block;font-size:0.5rem;color:#3a4060;letter-spacing:0.08em;}
  .sc-val{font-size:1.05rem;font-weight:700;}
  .sc-x .sc-val{color:var(--x);}
  .sc-o .sc-val{color:var(--o);}
  .sc-d .sc-val{color:#3a4060;}

  .btn-row{display:flex;gap:6px;}
  .btn{
    flex:1;
    font-family:'Share Tech Mono',monospace;
    font-size:0.65rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:11px 6px;
    border-radius:8px;
    border:1px solid var(--border);
    background:#0e1120;
    color:var(--text);
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    transition:background 0.15s,border-color 0.15s;
  }
  .btn:active{background:#161928;}
  .btn-c{
    flex:2;
    border-color:#6e78ff55;
    background:#6e78ff10;
    color:var(--accent);
  }
  .btn-c:active{background:#6e78ff20;}
  .btn-c:disabled{opacity:0.28;pointer-events:none;}
  .hint{
    text-align:center;
    font-family:'Share Tech Mono',monospace;
    font-size:0.56rem;
    color:#242740;
    letter-spacing:0.07em;
  }
</style>
</head>
<body>

<div id="topbar">
  <h1>3D TTT</h1>
  <div id="msg">Player X's turn</div>
  <div class="dots">
    <div class="dot dot-x dot-active" id="dot-x">X</div>
    <div class="dot dot-o"            id="dot-o">O</div>
  </div>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="tip"></div>
</div>

<div id="bottom">
  <div class="score-row">
    <div class="sc sc-x"><span class="sc-lbl">X WINS</span><span class="sc-val" id="sx">0</span></div>
    <div class="sc sc-d"><span class="sc-lbl">DRAWS</span> <span class="sc-val" id="sd">0</span></div>
    <div class="sc sc-o"><span class="sc-lbl">O WINS</span><span class="sc-val" id="so">0</span></div>
  </div>
  <div class="btn-row">
    <button class="btn btn-c" id="btnC" onclick="playCenter()">⊕ Play Center</button>
    <button class="btn"       onclick="resetGame()">↺ Reset</button>
  </div>
  <div class="hint">drag to rotate &nbsp;·&nbsp; tap to play</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Win lines ────────────────────────────────────────────────────────────────
const ci=(l,r,c)=>l*9+r*3+c;
function buildLines(){
  const L=[];
  for(let l=0;l<3;l++){
    for(let i=0;i<3;i++){
      L.push([ci(l,i,0),ci(l,i,1),ci(l,i,2)]);
      L.push([ci(l,0,i),ci(l,1,i),ci(l,2,i)]);
    }
    L.push([ci(l,0,0),ci(l,1,1),ci(l,2,2)]);
    L.push([ci(l,0,2),ci(l,1,1),ci(l,2,0)]);
  }
  for(let r=0;r<3;r++)for(let c=0;c<3;c++)L.push([ci(0,r,c),ci(1,r,c),ci(2,r,c)]);
  for(let i=0;i<3;i++){
    L.push([ci(0,i,0),ci(1,i,1),ci(2,i,2)]);L.push([ci(0,i,2),ci(1,i,1),ci(2,i,0)]);
    L.push([ci(0,0,i),ci(1,1,i),ci(2,2,i)]);L.push([ci(0,2,i),ci(1,1,i),ci(2,0,i)]);
  }
  L.push([ci(0,0,0),ci(1,1,1),ci(2,2,2)]);L.push([ci(0,0,2),ci(1,1,1),ci(2,2,0)]);
  L.push([ci(0,2,0),ci(1,1,1),ci(2,0,2)]);L.push([ci(0,2,2),ci(1,1,1),ci(2,0,0)]);
  return L;
}
const LINES=buildLines();

// ─── Game state ───────────────────────────────────────────────────────────────
let board=Array(27).fill(null);
let cur='X', over=false;
let score={X:0,O:0,D:0};
let hov=-1, winSet=new Set();

function checkWin(p){for(const l of LINES)if(l.every(i=>board[i]===p))return l;return null;}

// ─── Three.js ─────────────────────────────────────────────────────────────────
const wrap   = document.getElementById('canvas-wrap');
const canvas = document.getElementById('c');
const tip    = document.getElementById('tip');

const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0,0);

const scene=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(45,1,0.1,100);
cam.position.z=11;

scene.add(new THREE.AmbientLight(0xffffff,0.5));
const dl=new THREE.DirectionalLight(0xffffff,0.8);dl.position.set(5,8,6);scene.add(dl);
const dl2=new THREE.DirectionalLight(0x4444ff,0.3);dl2.position.set(-5,-3,-4);scene.add(dl2);

const grp=new THREE.Group();
scene.add(grp);
grp.quaternion.setFromEuler(new THREE.Euler(-0.44,0.61,0));

const M={
  empty:()=>new THREE.MeshPhongMaterial({color:0x1a1f35,transparent:true,opacity:0.82,shininess:60}),
  hover:()=>new THREE.MeshPhongMaterial({color:0x2a3580,emissive:0x1a2060,transparent:true,opacity:0.95,shininess:80}),
  X:    ()=>new THREE.MeshPhongMaterial({color:0xff3d6e,emissive:0x6e0020,shininess:100}),
  O:    ()=>new THREE.MeshPhongMaterial({color:0x00e5ff,emissive:0x003e50,shininess:100}),
  winX: ()=>new THREE.MeshPhongMaterial({color:0xff3d6e,emissive:0xff1050,shininess:120}),
  winO: ()=>new THREE.MeshPhongMaterial({color:0x00e5ff,emissive:0x00b8d0,shininess:120}),
};

const S=1.18, O2=-S;
const cells=[], meshes=[];
for(let l=0;l<3;l++)for(let r=0;r<3;r++)for(let c=0;c<3;c++){
  const bi=ci(l,r,c);
  const geo=new THREE.BoxGeometry(1,1,1);
  const mesh=new THREE.Mesh(geo,M.empty());
  mesh.position.set(O2+c*S,O2+r*S,O2+l*S);
  mesh.userData.bi=bi;
  const wf=new THREE.LineSegments(new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({color:0x3a4070,transparent:true,opacity:0.45}));
  mesh.add(wf);mesh.userData.wf=wf;
  grp.add(mesh);
  cells.push({mesh,sym:null,bi});
  meshes.push(mesh);
}

function makeX(){
  const g=new THREE.Group();
  const mat=new THREE.MeshPhongMaterial({color:0xff3d6e,emissive:0x6e0020,shininess:100});
  const geo=new THREE.BoxGeometry(0.7,0.13,0.13);
  const b1=new THREE.Mesh(geo,mat);b1.rotation.z=Math.PI/4;
  const b2=new THREE.Mesh(geo,mat);b2.rotation.z=-Math.PI/4;
  g.add(b1,b2);return g;
}
function makeO(){
  return new THREE.Mesh(new THREE.TorusGeometry(0.27,0.07,12,24),
    new THREE.MeshPhongMaterial({color:0x00e5ff,emissive:0x003e50,shininess:100}));
}

// ─── Input ────────────────────────────────────────────────────────────────────
const ray=new THREE.Raycaster();
const mn=new THREE.Vector2();

let drag=false,moved=false;
let sx=0,sy=0;
let sq=new THREE.Quaternion();
let lvx=0,lvy=0;
const THR=6,SEN=0.007;

// Get x/y from mouse or touch
function xy(e){
  // touchend uses changedTouches; touchstart/move use touches
  const t=e.touches&&e.touches.length?e.touches:e.changedTouches;
  if(t&&t.length)return[t[0].clientX,t[0].clientY];
  return[e.clientX,e.clientY];
}

// Convert clientX/Y to NDC and canvas-local px
function ndc(cx,cy){
  const r=canvas.getBoundingClientRect();
  return{
    nx:((cx-r.left)/r.width)*2-1,
    ny:((cy-r.top)/r.height)*-2+1,
    px:cx-r.left,py:cy-r.top
  };
}

function pointerDown(e){
  e.preventDefault();
  const[cx,cy]=xy(e);
  drag=true;moved=false;
  sx=cx;sy=cy;
  sq.copy(grp.quaternion);
  canvas.style.cursor='grabbing';
}

function pointerMove(e){
  e.preventDefault();
  const[cx,cy]=xy(e);
  const p=ndc(cx,cy);
  if(drag){
    const dx=cx-sx,dy=cy-sy;
    if(!moved&&(Math.abs(dx)>THR||Math.abs(dy)>THR)){
      moved=true;tip.style.display='none';
      if(hov!==-1){hov=-1;redraw();}
    }
    if(moved){
      const qy=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0),dx*SEN);
      const qx=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0),dy*SEN);
      grp.quaternion.copy(sq).premultiply(qy).premultiply(qx);
      lvx=dx*SEN;lvy=dy*SEN;
    }
    return;
  }
  // desktop hover only
  if(e.type==='mousemove'){
    mn.set(p.nx,p.ny);ray.setFromCamera(mn,cam);
    const hits=ray.intersectObjects(meshes);
    if(hits.length){
      const bi=hits[0].object.userData.bi;
      if(!board[bi]&&!over){
        canvas.style.cursor='pointer';
        if(bi!==hov){hov=bi;redraw();}
        const cc=bi%3,rr=Math.floor((bi%9)/3),ll=Math.floor(bi/9);
        tip.textContent=`L${ll+1} R${rr+1} C${cc+1}`;
        tip.style.display='block';
        tip.style.left=(p.px+12)+'px';tip.style.top=(p.py-28)+'px';
      }else{
        canvas.style.cursor='default';
        if(hov!==-1){hov=-1;redraw();}tip.style.display='none';
      }
    }else{
      canvas.style.cursor='grab';
      if(hov!==-1){hov=-1;redraw();}tip.style.display='none';
    }
  }
}

function pointerUp(e){
  e.preventDefault();
  if(!drag)return;
  drag=false;
  canvas.style.cursor='grab';
  if(moved){
    // no inertia — cube stops on release
  }else{
    // TAP = play
    if(!over){
      const[cx,cy]=xy(e);
      const p=ndc(cx,cy);
      mn.set(p.nx,p.ny);
      ray.setFromCamera(mn,cam);
      const hits=ray.intersectObjects(meshes);
      if(hits.length)playAt(hits[0].object.userData.bi);
    }
  }
}

// Mouse — window for move/up so drag outside canvas works
canvas.addEventListener('mousedown', pointerDown);
window.addEventListener('mousemove', e => { if(e.pointerType==='touch') return; pointerMove(e); });
window.addEventListener('mouseup',   e => { if(e.pointerType==='touch') return; pointerUp(e); });
canvas.addEventListener('mouseleave',()=>{
  if(!drag){hov=-1;tip.style.display='none';canvas.style.cursor='grab';redraw();}
});
// Touch — fully on canvas, passive:false so preventDefault works
canvas.addEventListener('touchstart',pointerDown,{passive:false});
canvas.addEventListener('touchmove', pointerMove,{passive:false});
canvas.addEventListener('touchend',  pointerUp,  {passive:false});

// ─── Game logic ───────────────────────────────────────────────────────────────
function playAt(bi){
  if(over||board[bi])return;
  board[bi]=cur;
  const e=cells.find(x=>x.bi===bi);
  const sym=cur==='X'?makeX():makeO();
  sym.scale.setScalar(0);e.mesh.add(sym);e.sym=sym;
  // pop
  let t=0;const pop=()=>{t+=0.08;
    sym.scale.setScalar(Math.min(t<0.7?(t/0.7)*1.15:t<1?1.15-((t-0.7)/0.3)*0.15:1,1.15));
    if(t<1)requestAnimationFrame(pop);else sym.scale.setScalar(1);};pop();

  const wl=checkWin(cur);
  if(wl){
    winSet=new Set(wl);redraw();
    setMsg(`${cur} WINS! 🎉`,cur);
    score[cur]++;updScore();over=true;
    document.getElementById('btnC').disabled=true;return;
  }
  if(board.every(v=>v)){
    setMsg('DRAW!',null);score.D++;updScore();over=true;
    document.getElementById('btnC').disabled=true;return;
  }
  cur=cur==='X'?'O':'X';
  redraw();updTurn();
  document.getElementById('btnC').disabled=!!board[13];
}

function playCenter(){playAt(13);}

function redraw(){
  cells.forEach(({mesh,bi})=>{
    const v=board[bi],iw=winSet.has(bi),ih=bi===hov&&!v&&!over;
    let mat;
    if(iw&&v==='X')mat=M.winX();
    else if(iw&&v==='O')mat=M.winO();
    else if(v==='X')mat=M.X();
    else if(v==='O')mat=M.O();
    else if(ih)mat=M.hover();
    else mat=M.empty();
    mesh.material.dispose();mesh.material=mat;
    const wf=mesh.userData.wf;
    if(wf){wf.material.color.setHex(iw?(v==='X'?0xff3d6e:0x00e5ff):ih?0x6e78ff:0x3a4070);
      wf.material.opacity=iw?1:ih?0.8:0.4;}
  });
}

function updTurn(){
  document.getElementById('dot-x').classList.toggle('dot-active',cur==='X');
  document.getElementById('dot-o').classList.toggle('dot-active',cur==='O');
  setMsg(`Player ${cur}'s turn`,cur);
}
function setMsg(t,p){
  const el=document.getElementById('msg');el.textContent=t;
  el.style.color=p==='X'?'var(--x)':p==='O'?'var(--o)':'#555a7a';
}
function updScore(){
  document.getElementById('sx').textContent=score.X;
  document.getElementById('so').textContent=score.O;
  document.getElementById('sd').textContent=score.D;
}
function resetGame(){
  board=Array(27).fill(null);cur='X';over=false;
  winSet=new Set();hov=-1;
  cells.forEach(e=>{if(e.sym){e.mesh.remove(e.sym);e.sym=null;}});
  redraw();updTurn();
  document.getElementById('btnC').disabled=false;
}

// ─── Resize ───────────────────────────────────────────────────────────────────
function resize(){
  const w=wrap.clientWidth,h=wrap.clientHeight;
  renderer.setSize(w,h,false);
  cam.aspect=w/h;cam.updateProjectionMatrix();
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,150));
resize();

// ─── Render loop ──────────────────────────────────────────────────────────────
(function loop(){
  requestAnimationFrame(loop);
  if(winSet.size>0){
    const s=1+0.04*Math.sin(Date.now()*0.004);
    winSet.forEach(bi=>{const e=cells.find(x=>x.bi===bi);if(e&&e.sym)e.sym.scale.setScalar(s);});
  }
  renderer.render(scene,cam);
})();

updTurn();
</script>
</body>
</html>
